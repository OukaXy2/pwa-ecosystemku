<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #chat { margin-bottom: 20px; }
    .msg { margin: 8px 0; }
    .user { color: blue; }
    .ai { color: green; }
    .config { margin-bottom: 20px; }
  </style>
</head>
<body>

<h2>AI Assistant</h2>

<div class="config">
  <input id="apiKey" placeholder="Masukkan Groq API Key" />
  <button onclick="saveKey()">Simpan API</button>
</div>

<div id="chat"></div>

<input id="input" placeholder="Ketik sesuatu..." />
<button onclick="send()">Kirim</button>

<script>
const chat = document.getElementById("chat");

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
}

async function typeEffect(element, text) {
  element.innerText = "";
  for (let char of text) {
    element.innerText += char;
    await sleep(15);
  }
}

// simpan API key
function saveKey() {
  const key = document.getElementById("apiKey").value;
  localStorage.setItem("GROQ_API_KEY", key);
  alert("API Key disimpan!");
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  const apiKey = localStorage.getItem("GROQ_API_KEY");

  if (!apiKey) {
    alert("Masukkan API key dulu!");
    return;
  }

  if (!text) return;

  addMessage("Kamu: " + text, "user");
  input.value = "";

  const thinking = document.createElement("div");
  thinking.className = "msg ai";

  const thinkingText = ["hmm...", "bentar ya...", "aku pikir dulu..."];
  thinking.innerText = thinkingText[Math.floor(Math.random() * thinkingText.length)];

  chat.appendChild(thinking);

  await sleep(800);

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "llama3-70b-8192",
        messages: [
          { role: "system", content: "Kamu asisten santai, bantu user berpikir." },
          { role: "user", content: text }
        ]
      })
    });

    const data = await res.json();

    const reply = data?.choices?.[0]?.message?.content || JSON.stringify(data);

    await typeEffect(thinking, "AI: " + reply);

  } catch (err) {
    thinking.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
